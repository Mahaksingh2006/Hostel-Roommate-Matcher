<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HostelMatch Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#667eea,#764ba2);
overflow:hidden;
}

body::before{
content:'';
position:absolute;
width:500px;
height:500px;
background:rgba(255,255,255,0.1);
border-radius:50%;
top:-150px;
left:-150px;
}

body::after{
content:'';
position:absolute;
width:400px;
height:400px;
background:rgba(255,255,255,0.08);
border-radius:50%;
bottom:-150px;
right:-100px;
}

.container{
width:900px;
height:550px;
display:flex;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(20px);
border-radius:25px;
overflow:hidden;
box-shadow:0 20px 50px rgba(0,0,0,.25);
}

.left{
flex:1;
padding:50px;
color:white;
display:flex;
flex-direction:column;
justify-content:center;
}

.left h1{
font-size:3rem;
margin-bottom:15px;
}

.left p{
font-size:1rem;
line-height:1.8;
opacity:.9;
}

.left .emoji{
font-size:80px;
margin-bottom:20px;
}

.right{
width:400px;
background:white;
padding:40px;
display:flex;
flex-direction:column;
justify-content:center;
}

.tabs{
display:flex;
margin-bottom:25px;
background:#f4f4f4;
border-radius:12px;
padding:5px;
}

.tabs button{
flex:1;
padding:12px;
border:none;
background:none;
cursor:pointer;
font-weight:600;
border-radius:10px;
}

.active{
background:#667eea;
color:white;
}

input{
width:100%;
padding:14px;
margin:8px 0;
border:1px solid #ddd;
border-radius:12px;
outline:none;
}

input:focus{
border-color:#667eea;
}

.submit-btn{
width:100%;
padding:14px;
margin-top:15px;
border:none;
background:#667eea;
color:white;
font-size:16px;
font-weight:600;
border-radius:12px;
cursor:pointer;
transition:.3s;
}

.submit-btn:hover{
background:#5563d6;
transform:translateY(-2px);
}

.form{
display:none;
}

.show{
display:block;
}

.small{
text-align:center;
margin-top:15px;
font-size:13px;
color:#666;
}

</style>
</head>
<body>

<div class="container">

<div class="left">

<div class="emoji">🏠</div>

<h1>HostelMatch Pro</h1>

<p>
Find your perfect roommate based on interests,
study habits, lifestyle and compatibility.
Making hostel life easier and smarter.
</p>

</div>

<div class="right">

<div class="tabs">
<button id="loginTab" class="active">Login</button>
<button id="signupTab">Sign Up</button>
</div>

<div id="loginForm" class="form show">

<input type="text" id="loginUsername" placeholder="Username">

<input type="password" id="loginPassword" placeholder="Password">

<button class="submit-btn" onclick="login()">
Login
</button>

</div>

<div id="signupForm" class="form">

<input type="text" id="signupUsername" placeholder="Username">

<input type="email" id="signupEmail" placeholder="Email">

<input type="password" id="signupPassword" placeholder="Password">

<input type="password" id="confirmPassword" placeholder="Confirm Password">

<button class="submit-btn" onclick="signup()">
Create Account
</button>

</div>

<div class="small">
Hostel Roommate Matcher © 2026
</div>

</div>

</div>

<script>

const loginTab=document.getElementById("loginTab");
const signupTab=document.getElementById("signupTab");

const loginForm=document.getElementById("loginForm");
const signupForm=document.getElementById("signupForm");

loginTab.onclick=()=>{
loginTab.classList.add("active");
signupTab.classList.remove("active");

loginForm.classList.add("show");
signupForm.classList.remove("show");
}

signupTab.onclick=()=>{
signupTab.classList.add("active");
loginTab.classList.remove("active");

signupForm.classList.add("show");
loginForm.classList.remove("show");
}

function signup(){

const username=document.getElementById("signupUsername").value;
const email=document.getElementById("signupEmail").value;
const password=document.getElementById("signupPassword").value;
const confirm=document.getElementById("confirmPassword").value;

if(password!==confirm){
alert("Passwords do not match");
return;
}

localStorage.setItem("username",username);
localStorage.setItem("email",email);
localStorage.setItem("password",password);

alert("Account Created Successfully!");

loginTab.click();
}

function login(){

const username=document.getElementById("loginUsername").value;
const password=document.getElementById("loginPassword").value;

const savedUser=localStorage.getItem("username");
const savedPass=localStorage.getItem("password");

if(username===savedUser && password===savedPass){

window.location.href="dashboard.html";

}else{

alert("Invalid Credentials");

}
}

</script>

</body>
</html>
