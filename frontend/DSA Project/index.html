<!DOCTYPE html>
<html>
<head>
    <title>HostelMatch Pro</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#667eea,#764ba2);
        }

        .login-box{
            width:380px;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
            text-align:center;
        }

        .login-box h1{
            color:#333;
            margin-bottom:10px;
        }

        .login-box p{
            color:#777;
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ddd;
            border-radius:10px;
            outline:none;
        }

        input:focus{
            border-color:#667eea;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:15px;
            border:none;
            border-radius:10px;
            background:#667eea;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#5563d6;
        }

        .logo{
            font-size:50px;
            margin-bottom:15px;
        }
    </style>
</head>

<body>

<div class="login-box">

    <div class="logo">🏠</div>

    <h1>HostelMatch Pro</h1>

    <p>Find Your Perfect Roommate</p>

    <input id="username" placeholder="Username">

    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>

</div>

<script>
function login(){

    let username =
        document.getElementById("username").value;

    let password =
        document.getElementById("password").value;

    if(username==="admin" && password==="1234"){

        window.location.href="dashboard.html";

    }else{

        alert("Invalid Username or Password");

    }
}
</script>

</body>
</html>
